name: Android VNC Canvas Sandbox

on:
  workflow_dispatch:

jobs:
  android-vnc:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 必要なパッケージのインストール
        run: |
          sudo apt-get update
          # 古い libgl1-mesa-glx を排して、現代の libgl1、libglx-mesa0、libpulse0 に修正！
          sudo apt-get install -y xvfb x11vnc fvwm websockify novnc libpulse0 libgl1 libglx-mesa0
          echo "[ACTION] 最新の依存ライブラリと画面共有パッケージの補給が完了したぞ！"
          echo "[ACTION] 画面共有用のベースパッケージのインストールが完了したぞ！"

      - name: 2. Android SDK & エミュレータのセットアップ
        run: |
          sudo apt-get install -y openjdk-17-jdk
          mkdir -p $HOME/android-sdk/cmdline-tools
          curl -L https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          
          # 環境変数をこのステップ内で定義
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_AVD_HOME=$HOME/.android/avd
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/emulator:$ANDROID_HOME/platform-tools
          
          mkdir -p $ANDROID_AVD_HOME
          echo "[ACTION] AVDの保存先ディレクトリを設定: $ANDROID_AVD_HOME"
          
          # ライセンス承諾とイメージの取得
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "emulator" "system-images;android-28;default;x86" > /dev/null
          
          # AVD(仮想デバイス)を保存先を指定して確実に作成
          echo "no" | avdmanager create avd -n test_android -k "system-images;android-28;default;x86" --force
          echo "[ACTION] AVD 'test_android' の作成コマンドが完了したぞ！"
          
          # 本当にファイルがあるかログで確認（部隊の掟：値の変化をログに出す）
          echo "[ACTION] 作成されたAVDの一覧ログ:"
          emulator -list-avds

      - name: 3. 仮想ディスプレイとVNCの起動
        run: |
          Xvfb :1 -screen 0 800x1280x24 &
          export DISPLAY=:1
          sleep 3
          fvwm & 
          
          x11vnc -display :1 -nopw -listen localhost -forever -shared &
          echo "[ACTION] 仮想ディスプレイ(:1)とVNCサーバー(5900)がバックグラウンドで起動したぞ！"

      - name: 4. エミュレータのバックグラウンド起動
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_AVD_HOME=$HOME/.android/avd
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/emulator:$ANDROID_HOME/platform-tools
          export DISPLAY=:1
          
          echo "[ACTION] これからエミュレータを召喚する！ターゲット: test_android"
          # パスが通っている状態で、AVDを指定して起動
          emulator -avd test_android -no-accel -no-audio -gpu swiftshader_indirect &
          
          # 起動直後のログを少し待って確認
          sleep 5
          echo "[ACTION] エミュレータ起動プロセスの初期化を完了したぞ！"

      - name: 5. noVNC(WebSocket) & Cloudflare Tunnel 起動
        run: |
          echo "[ACTION] noVNC をポート 6080 で起動中..."
          # VNC(5900)をブラウザ用WebSocket(6080)に変換してWebサーバー起動
          /usr/share/novnc/utils/launch.sh --vnc localhost:5900 --listen 6080 &
          
          # Webサーバーが完全に立ち上がるまで10秒待機（502対策！）
          sleep 10
          echo "[ACTION] noVNC Webサーバーの起動待機が完了したぞ！"
          
          # cloudflaredをダウンロード
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          
          # トンネル開通
          ./cloudflared tunnel --url http://localhost:6080 > cloudflare.log 2>&1 &
          sleep 5
          
          echo "=================================================="
          echo "🌐 【探検隊・ブラウザ接続URL】ここへ突入せよ！"
          echo "=================================================="
          grep -o 'https://[^ ]*trycloudflare.com' cloudflare.log || cat cloudflare.log
          echo "=================================================="
          echo "💡 502が出る場合は、あと1〜2分待ってからページをリロードしてみてくれ！"
          echo "=================================================="
          
          # 6時間生存ループ
          echo "[ACTION] 6時間のキャンバスハック作戦、維持ループ突入！"
          sleep 21600
      - name: 6. git push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 変更がある場合のみコミット
          git diff --quiet && git diff --staged --quiet || (git commit -m "build: auto-compile minecraft web edition" && git push)
